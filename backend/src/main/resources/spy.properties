# ================================================================
# p6spy 設定ファイル
# JDBCをラップしてパラメータ込みの実行済みSQL文をログ出力する
# ================================================================

# 使用モジュール（ログ出力 + タイムアウト監視）
modulelist=com.p6spy.engine.logging.P6LogFactory,com.p6spy.engine.outage.P6OutageFactory

# 実際の MySQL ドライバ（p6spy がラップして委譲する先）
driverlist=com.mysql.cj.jdbc.Driver

# ----------------------------------------------------------------
# 出力先: SLF4J (logback) へ出力
#   → logback-spring.xml の <logger name="p6spy"> で制御される
# ----------------------------------------------------------------
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# ----------------------------------------------------------------
# ログフォーマット
#   %(executionTime) : 実行時間(ms)
#   %(sql)           : パラメータが埋め込まれた実行済みSQL文
#   %(category)      : statement / commit / rollback など
# ----------------------------------------------------------------
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(executionTime)ms | %(sql)

# ----------------------------------------------------------------
# フィルタ設定（不要な category を除外してログを絞り込む）
#   commit / rollback はログに出力しない
# ----------------------------------------------------------------
filter=true
excludecategories=info,debug,result,batch,rollback,commit
