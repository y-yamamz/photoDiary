spring:
  datasource:
    # p6spy が JDBC をラップして実SQLをログ出力する（jdbc:p6spy: プレフィックスが必要）
    #url: jdbc:p6spy:mysql://192.168.0.10:3306/photodb?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
    url: jdbc:p6spy:mysql://mysql84:3306/photodb?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
    username: yama
    password: yama
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB

mybatis:
  mapper-locations: classpath:/sql/**/*.xml
  type-aliases-package: com.photo.backend.db.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  address: 0.0.0.0
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always


storage:
  base-path: /var/photodiary/images
  #base-path: \\192.168.0.5\homedir\PhotoDiary

jwt:
  secret: todoapp-jwt-secret-key-change-in-production-32chars!!
  access-token-expiry: 3600000
  refresh-token-expiry: 604800000

admin:
  secret: ${ADMIN_SECRET:photo-admin-secret-change-me}

logging:
  level:
    root: INFO
  log:
    # ログファイルの出力先ディレクトリ (絶対パス or 相対パス)
    # 例) /var/log/photodiary  または  logs
    #path: logs
    path: /var/photodiary/images/logs
    # SQLログレベル: OFF=出力しない / DEBUG=実行SQL文を出力
    sql: OFF

