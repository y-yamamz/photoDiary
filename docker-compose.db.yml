version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: mysql84
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: tododb
      MYSQL_USER: yama
      MYSQL_PASSWORD: yama
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./conf.d:/etc/mysql/conf.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --bind-address=0.0.0.0 #これがないと外部PCから接続できません。
    networks: #コンテナ間通信のため、ネットワーク名を指定
      - backend-net

volumes:
  mysql_data:

networks:
  backend-net: #Compose 内で参照するネットワークのキー名
    name: backend-net #Docker が作成する実際のネットワーク名