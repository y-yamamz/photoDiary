# =============================================================
# PhotoDiary - Docker Compose (WAR デプロイ版) [外部HDD (Yドライブ) 版]
#
# 前提: build-war.bat を実行して以下が存在すること
#   Doc/Deploy/War/hdd/backend.war
#   Doc/Deploy/War/hdd/frontend.war
#
# 起動コマンド (Doc/Deploy/War/hdd/ フォルダで実行):
#   docker compose -f docker-compose.hdd.yml up -d --build
#
# 停止コマンド:
#   docker compose -f docker-compose.hdd.yml down
#
# 画像保存先: 外部HDD (Yドライブ) ローカルバインドマウント
#   Docker Desktop の Settings > Resources > File sharing に
#   Yドライブのパスを追加しておく必要がある。
# =============================================================

services:

  # =====================
  # フロントエンド (Nginx + React)
  # =====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: photodiary-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - photodiary-network

  # =====================
  # バックエンド (Tomcat + Spring Boot)
  # =====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: photodiary-backend
    environment:
      - SPRING_DATASOURCE_URL=${MYSQL_URL:-jdbc:mysql://192.168.0.10:3306/photodb?useSSL=false&serverTimezone=Asia/Tokyo}
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-yama}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-yama}
      - STORAGE_BASE_PATH=/var/photodiary/images
      - TZ=Asia/Tokyo
      - JAVA_OPTS=-Dfile.encoding=UTF-8 -Duser.timezone=Asia/Tokyo
    volumes:
      # 外部HDD (Yドライブ) をバインドマウント
      # Windows パス例: Y:\PhotoDiary → Docker 内: /var/photodiary/images
      - "${IMAGE_LOCAL_PATH:-Y:/PhotoDiary}:/var/photodiary/images"
    restart: unless-stopped
    networks:
      - photodiary-network

networks:
  photodiary-network:
    name: photodiary-war-network
