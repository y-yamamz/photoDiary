# =============================================================
# PhotoDiary - Docker Compose 構成（Windows Yドライブ使用版）
# =============================================================

services:

  frontend:
    build:
      context: ../..
      dockerfile: Doc/Deploy/frontend/Dockerfile
    container_name: photodiary-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: Doc/Deploy/backend/Dockerfile
    container_name: photodiary-backend

    environment:
      - SPRING_DATASOURCE_URL=${MYSQL_URL:-jdbc:mysql://192.168.0.3:3306/photodb?useSSL=false&serverTimezone=Asia/Tokyo}
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-yama}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-yama}
      - STORAGE_BASE_PATH=/var/photodiary/images
      - TZ=Asia/Tokyo
      - JAVA_OPTS=-Dfile.encoding=UTF-8 -Duser.timezone=Asia/Tokyo

    volumes:
      # 🔥 NAS（Yドライブ）をそのままマウント
      - //192.168.0.5/HOMEDIR/PhotoDiary:/var/photodiary/images

    restart: unless-stopped

networks:
  default:
    name: photodiary-network